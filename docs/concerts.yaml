# Concert test corpus — machine-readable mirror of docs/CONCERT_RESEARCH.md §2.
#
# Consumed by:
#   - The auto-tune harness (D:\Lyric-Immersion-Auto\auto\concerts_corpus.py) for
#     concert-specific scoring against known setlists.
#   - main.py._load_concert_setlist as a MANUAL-OVERRIDE fallback when neither
#     YouTube chapters, description-embedded timestamps, nor
#     parse_song_candidates yields a usable setlist for a given URL.
#
# start_s values come from cross-verified sources (setlist.fm / Wikipedia /
# official releases / YouTube chapter markers). Where a time is estimated,
# `time_confidence: est` is set — treat as a soft anchor, not ground truth.
#
# See docs/CONCERT_RESEARCH.md §7 for open questions and the change log.

version: 1
schema:
  entry:
    key: string                  # filesystem-safe identifier
    url: string                  # YouTube watch URL
    video_id: string
    title: string
    artist: string
    channel: string
    duration_s: number | null
    is_concert: bool
    has_mc: bool
    has_intermissions: bool
    has_chapter_markers: bool
    setlist_confidence: high | medium | low | unknown
    vtuber: bool
    language: string             # ISO 639-1 or "mixed"
    weight: number               # per-concert score weight in the harness
    setlist: [ { pos, title, artist?, type, start_s?, time_confidence?, notes? } ]
    mc_segments_s: [ [start, end], ... ]   # measured / annotated MC intervals
    known_pending_releases: [ string, ... ]
    failure_modes: [ enum, ... ]
    sources: [ url, ... ]

concerts:

