# Cross-platform CI (PORTING.md Phase 0): prove the codebase installs and
# imports on Linux, macOS, and Windows, and live-test the Linux MPRIS
# now-playing provider against a mock player on a private D-Bus session.
name: ci
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  import-gate:
    name: import gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Linux system libraries (libpulse for soundcard import, dbus for the MPRIS test)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0 dbus
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import gate
        run: python scripts/ci_import_gate.py
      - name: MPRIS provider live test (mock player, private session bus)
        if: runner.os == 'Linux'
        run: dbus-run-session -- python scripts/test_mpris_provider.py
